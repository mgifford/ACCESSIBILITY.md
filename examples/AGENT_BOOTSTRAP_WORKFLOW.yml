# Draft ACCESSIBILITY.md with GitHub Copilot CLI.
#
# PURPOSE
# -------
# This example manually generates an uncommitted ACCESSIBILITY.md draft and
# uploads it as a workflow artifact for human review. It does not push a branch,
# open a pull request, modify repository settings, or establish conformance.
#
# WHY COPILOT CLI
# ---------------
# The previous example referenced github/copilot-agent@v1. That action was not
# verified in current official GitHub documentation. GitHub documents Copilot
# CLI as a supported way to run a prompt in GitHub Actions.
#
# GitHub also offers Copilot cloud-agent automations through the Agents
# interface, but current documentation limits those automations to private and
# internal repositories. This CLI example can be adapted more broadly, subject
# to account and organization policies.
#
# BEFORE COPYING
# --------------
# 1. Read the current documentation:
#    https://docs.github.com/en/copilot/how-tos/copilot-cli/automate-copilot-cli/automate-with-actions
# 2. Copy this file to .github/workflows/bootstrap-accessibility.yml.
# 3. Copy the current ACCESSIBILITY-template.md, AGENTS.md, and
#    examples/COPILOT_BOOTSTRAP_AGENT_PROMPT.md into the target repository.
# 4. Adapt relative links in the template for the target repository.
# 5. Configure COPILOT_GITHUB_TOKEN as described below.
# 6. Review all action pins, the Copilot CLI version, permissions, retention,
#    cost, and organization policy before enabling the workflow.
#
# AUTHENTICATION
# --------------
# This example expects an Actions secret named COPILOT_GITHUB_TOKEN. Use a
# fine-grained token with the Copilot Requests permission and only the
# repository access required to read this repository. Organization-owned
# repositories may be able to use GITHUB_TOKEN when the applicable Copilot CLI
# policy is enabled; follow current GitHub documentation rather than widening a
# personal token.
#
# Never use a broadly scoped personal access token for this example.
#
# VERSION REVIEW
# --------------
# Reviewed: 2026-07-19
# Copilot CLI npm package: @github/copilot@1.0.71
# Action tags were resolved to the full commit SHAs shown below on the review
# date. Re-resolve and review them before copying this example.

name: Draft ACCESSIBILITY.md

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: >-
          Type DRAFT to confirm that the workflow should create an uncommitted
          artifact for human review.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: accessibility-bootstrap-${{ github.repository }}
  cancel-in-progress: false

jobs:
  draft:
    name: Generate draft artifact
    if: ${{ inputs.confirmation == 'DRAFT' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository without stored credentials
        # actions/checkout v6, resolved 2026-07-19.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Verify bootstrap inputs
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "ACCESSIBILITY-template.md"
            "examples/COPILOT_BOOTSTRAP_AGENT_PROMPT.md"
          )

          for required_file in "${required_files[@]}"; do
            if [[ ! -f "$required_file" ]]; then
              echo "Required file is missing: $required_file" >&2
              exit 1
            fi
          done

          if [[ -e "ACCESSIBILITY.md" ]]; then
            echo "ACCESSIBILITY.md already exists." >&2
            echo "Use a review task instead of the bootstrap workflow." >&2
            exit 1
          fi

      - name: Set up Node.js
        # actions/setup-node v4, resolved 2026-07-19.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Install the reviewed Copilot CLI version
        shell: bash
        run: npm install --global @github/copilot@1.0.71

      - name: Extract the bootstrap task
        shell: bash
        run: |
          set -euo pipefail

          prompt_file="$RUNNER_TEMP/accessibility-bootstrap-prompt.txt"

          awk '
            /^```text$/ { if (found) exit 2; found = 1; next }
            /^```$/ && found { closed = 1; exit }
            found { print }
            END { if (!found || !closed) exit 3 }
          ' examples/COPILOT_BOOTSTRAP_AGENT_PROMPT.md > "$prompt_file"

          if [[ ! -s "$prompt_file" ]]; then
            echo "The extracted bootstrap task is empty." >&2
            exit 1
          fi

      - name: Generate ACCESSIBILITY.md draft
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${COPILOT_GITHUB_TOKEN:-}" ]]; then
            echo "The COPILOT_GITHUB_TOKEN secret is not configured." >&2
            exit 1
          fi

          prompt_file="$RUNNER_TEMP/accessibility-bootstrap-prompt.txt"

          copilot \
            --prompt "$(< "$prompt_file")" \
            --allow-tool='read,write(ACCESSIBILITY.md)' \
            --deny-tool='shell,url,memory' \
            --no-ask-user

      - name: Validate the generated draft
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -s "ACCESSIBILITY.md" ]]; then
            echo "Copilot did not create a non-empty ACCESSIBILITY.md." >&2
            exit 1
          fi

          unexpected_changes="$({
            git status --porcelain=v1 --untracked-files=all
          } | awk '$2 != "ACCESSIBILITY.md" { print }')"

          if [[ -n "$unexpected_changes" ]]; then
            echo "Unexpected files were changed:" >&2
            echo "$unexpected_changes" >&2
            exit 1
          fi

          placeholder_count="$({
            grep -o '{{[^}][^}]*}}' ACCESSIBILITY.md || true
          } | sort -u | wc -l | tr -d ' ')"

          {
            echo "## ACCESSIBILITY.md bootstrap"
            echo
            echo "A draft was generated but was not committed or published."
            echo
            echo "- Unique unresolved placeholders: $placeholder_count"
            echo "- Repository files changed: ACCESSIBILITY.md only"
            echo "- Required next step: download and review the artifact"
            echo "- Conformance established: no"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload draft for human review
        # actions/upload-artifact v4, resolved 2026-07-19.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: accessibility-policy-draft-${{ github.run_id }}
          path: ACCESSIBILITY.md
          if-no-files-found: error
          retention-days: 7
