name: Accessibility Issue
description: Report an accessibility barrier or WCAG violation
title: "[A11Y]: "
labels: ["accessibility"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve accessibility! Please fill in as much detail as you can so the issue can be reproduced and fixed.

  - type: input
    id: target-url
    attributes:
      label: URL or Location
      description: Where did you encounter this issue? Include the full URL or describe the page/component.
      placeholder: "e.g., https://example.com/checkout or Local: http://localhost:3000/dashboard"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can someone else reproduce this issue?
      placeholder: |
        1. Navigate to [URL]
        2. [Describe the action, e.g. "Tab to the submit button"]
        3. Observe that [what goes wrong]
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: Expected and Actual Behaviour
      description: What should happen, and what actually happens?
      placeholder: |
        Expected: The button has an accessible name announced by the screen reader.
        Actual: The screen reader announces "unlabeled button".
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and assistive technology (if applicable).
      placeholder: |
        - Browser: Chrome 124 / Firefox 125 / Safari 17
        - OS: Windows 11 / macOS 14 / iOS 17
        - Screen reader: NVDA 2024.1 / VoiceOver / N/A
        - Testing tool: axe DevTools / Lighthouse / Manual
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How does this issue impact users?
      options:
        - Critical - Prevents completing core tasks
        - High - Significant barrier to access
        - Medium - Moderate usability issue
        - Low - Minor accessibility improvement
    validations:
      required: true

  - type: input
    id: wcag-criterion
    attributes:
      label: WCAG Success Criterion (if known)
      description: e.g., 1.1.1 Non-text Content, 2.4.3 Focus Order
      placeholder: "e.g., 4.1.2 Name, Role, Value (Level A)"
    validations:
      required: false

  - type: textarea
    id: code-snippet
    attributes:
      label: HTML Snippet (if available)
      description: Minimal HTML fragment showing the issue.
      placeholder: |
        <button>
          <img src="close.svg">
        </button>
      render: html
    validations:
      required: false
