name: Build Skill Archives

on:
  push:
    branches: [main]
    paths:
      - "skills/*/SKILL.md"
      - "skills/*/SYNC.md"
      - "skills/*/README.md"
      - "skills/*/references/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-archives:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild .skill ZIP archives
        run: |
          cd skills
          for dir in */; do
            dir="${dir%/}"
            if [ -d "$dir" ]; then
              echo "Building ${dir}.skill..."
              rm -f "${dir}.skill"
              zip -r "${dir}.skill" "${dir}/"
            fi
          done

      - name: Commit rebuilt archives
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/*.skill
          if git diff --cached --quiet; then
            echo "No skill archives changed."
          else
            git commit -m "chore: rebuild .skill archives [skip ci]"
            git push
          fi
