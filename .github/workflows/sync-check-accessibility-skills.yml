name: Check sync with accessibility-skills

on:
  schedule:
    # Run weekly on Monday at 08:17 UTC.
    # Avoid :00 because GitHub scheduled workflows are often delayed there.
    - cron: '17 8 * * 1'
  workflow_dispatch:
    inputs:
      threshold_lines:
        description: 'Minimum changed lines to flag a file as diverged'
        required: false
        type: number
        default: 10

permissions:
  contents: read
  issues: write

jobs:
  check-sync:
    name: Compare SKILL.md files with local BEST_PRACTICES files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
