include_mail = false
accept = [200, 206, 429]
max_concurrency = 12

# Known local placeholders that should not be treated as broken web links.
# GitHub project/repo links are excluded because GitHub frequently returns 404
# for automated link checkers even when the resource is publicly accessible.
exclude = [
  "^http://localhost",
  "^http://127\\.0\\.0\\.1",
  "^https://example\\.com",
  "^https://github\\.com",
  # IDRC site has intermittent connectivity issues in CI environments
  "^https://idrc\\.ocadu\\.ca",
  # Personal blog with intermittent availability in CI environments
  "^https://codersblock\\.com",
  # Personal blog with intermittent availability in CI environments
  "^https://barish\\.me",
  # Medium returns 403 to automated link checkers even for valid articles
  "^https://medium\\.com",
  # npmjs.com returns 403 to automated link checkers even for valid packages
  "^https://www\\.npmjs\\.com"
]
